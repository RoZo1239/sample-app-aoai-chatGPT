name: Build and Push Docker Image

on:
  push:
    branches: [ "patch-1" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push to ACR
        run: |
          az acr build \
            --registry sampleappaoaichatgpt \
            --image sample-app-aoai-chatgpt:latest \
            .
