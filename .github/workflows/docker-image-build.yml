name: Docker Image Build

on:
  push:
    branches:
      - patch-1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login aztestwestus3backendacr.azurecr.io \
          --username ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and Tag Docker image
        run: |
          IMAGE_NAME=aztestwestus3backendacr.azurecr.io/sample-app-aoai-chatgpt
          TAG=patch1-${{ github.run_number }}

          echo "Using tag: $TAG"

          docker build . \
            --no-cache \
            --file WebApp.Dockerfile \
            --tag $IMAGE_NAME:$TAG

          docker tag $IMAGE_NAME:$TAG $IMAGE_NAME:latest

      - name: Push Docker image
        run: |
          IMAGE_NAME=aztestwestus3backendacr.azurecr.io/sample-app-aoai-chatgpt
          TAG=patch1-${{ github.run_number }}

          docker push $IMAGE_NAME:$TAG
          docker push $IMAGE_NAME:latest
