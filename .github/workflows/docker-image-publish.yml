name: Docker Image Publish

on:
  push:
    branches:
      - patch-1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Login to ACR
      uses: azure/docker-login@v2
      with:
        login-server: aztestwestus3backendacr.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push
      run: |
        IMAGE_NAME=aztestwestus3backendacr.azurecr.io/sample-app-aoai-chatgpt

        docker build . --file WebApp.Dockerfile --tag $IMAGE_NAME:patch1
        docker push $IMAGE_NAME:patch1
