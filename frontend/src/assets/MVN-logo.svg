<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 291" fill="none" role="img" aria-label="MilVet Navigator">
  <!-- Compass star group (290x290 canvas) -->
  <g>
    <!--
      4-pointed compass star with concave bezier curves between cardinal tips.
      Outer tips at R=145 from center (145,145): N(145,2) E(288,145) S(145,288) W(2,145)
      Inner saddle points at r=55 from center, at 45° diagonals:
        NE(184,106) SE(184,184) SW(106,184) NW(106,106)
      Quadratic bezier control points pull concave sections toward center.
    -->
    <path
      fill="#2B3E6B"
      d="
        M 145,2
        Q 155,100 184,106
        Q 191,135 288,145
        Q 191,155 184,184
        Q 155,191 145,288
        Q 135,191 106,184
        Q 100,155 2,145
        Q 100,135 106,106
        Q 135,100 145,2
        Z
      "
    />

    <!-- Center circle — white background for graduation figure -->
    <circle cx="145" cy="145" r="58" fill="#FFFFFF"/>

    <!-- Subtle ring on center circle -->
    <circle cx="145" cy="145" r="56" fill="none" stroke="#2B3E6B" stroke-width="2" stroke-opacity="0.18"/>

    <!--
      Graduation figure — geometric low-poly style.
      Mortarboard cap, head, torso using polygons for a stylized look.
    -->

    <!-- Mortarboard flat board -->
    <polygon points="145,97 122,109 168,109" fill="#2B3E6B"/>

    <!-- Mortarboard brim (rectangle under board) -->
    <rect x="122" y="109" width="46" height="6" fill="#2B3E6B" rx="1"/>

    <!-- Tassel — line + circle dot -->
    <line x1="168" y1="112" x2="176" y2="124" stroke="#2B3E6B" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="176" cy="127" r="3.5" fill="#2B3E6B"/>

    <!-- Head -->
    <circle cx="145" cy="127" r="10" fill="#8AB0D4"/>

    <!-- Torso / body — main polygon -->
    <polygon points="145,137 122,153 118,185 145,181 172,185 168,153" fill="#6B8FC4"/>

    <!-- Body shading — left facet (darker) -->
    <polygon points="145,137 122,153 138,165" fill="#4E72A8"/>

    <!-- Body shading — right facet (lighter) -->
    <polygon points="145,137 168,153 152,165" fill="#8AADD9"/>

    <!-- Body shading — center facet -->
    <polygon points="138,165 145,137 152,165 145,170" fill="#5E80BB"/>
  </g>

  <!--
    "MilVet Navigator" logotype text.
    Positioned to the right of the compass (x=318) and vertically centered (y=192).
    Uses a heavy sans-serif weight matching the brand identity.
  -->
  <text
    x="318"
    y="192"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="94"
    fill="#2B3E6B"
    letter-spacing="-2"
  >MilVet Navigator</text>
</svg>
